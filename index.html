<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Grasshopper 风格电池编辑器 - Kangaroo2</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- 顶部工具栏 -->
        <div class="toolbar">
            <div class="toolbar-left">
                <button id="clearCanvas" class="tool-btn">清空画布</button>
                <button id="exportJson" class="tool-btn">导出 JSON</button>
                <button id="importJson" class="tool-btn">导入 JSON</button>
                <input type="file" id="importFile" accept=".json" style="display: none;">
            </div>
            <div class="toolbar-center">
                <span class="zoom-info">缩放: <span id="zoomLevel">100</span>%</span>
            </div>
            <div class="toolbar-right">
                <span class="status" id="status">就绪</span>
            </div>
        </div>

        <!-- 主体区域 -->
        <div class="main-content">
            <!-- 左侧电池库 -->
            <div class="component-library">
                <div class="library-header">
                    <h3>📦 Kangaroo2 电池库</h3>
                    <button id="addCustomComponent" class="icon-btn" title="添加自定义电池">+</button>
                </div>
                <div class="library-items" id="componentLibrary">
                    <!-- 电池将动态生成 -->
                    <div style="color: #888; text-align: center; padding: 20px;">加载中...</div>
                </div>
            </div>

            <!-- 右侧画布区域 -->
            <div class="canvas-container">
                <canvas id="canvas" class="canvas"></canvas>
                <!-- 右键菜单 -->
                <div class="context-menu" id="contextMenu" style="display: none;">
                    <div class="context-item" data-action="delete">🗑️ 删除电池</div>
                    <div class="context-item" data-action="rename">✏️ 重命名</div>
                    <div class="context-item" data-action="addInput">➕ 添加输入端口</div>
                    <div class="context-item" data-action="addOutput">➕ 添加输出端口</div>
                    <div class="context-divider"></div>
                    <div class="context-item" data-action="duplicate">📋 复制</div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/components.js"></script>
    <script src="js/canvas.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
